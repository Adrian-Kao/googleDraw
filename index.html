<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>豪華 3D 抽獎扭蛋機</title>
    <style>
         :root {
            --primary-red: #d63031;
            --dark-red: #8b0000;
            --gold: #f1c40f;
            --silver: #bdc3c7;
            --glass: rgba(255, 255, 255, 0.2);
        }
        
        body {
            background: radial-gradient(circle, #2f3542, #2f3542);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 0;
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            overflow: hidden;
        }
        /* 標題與剩餘數量顯示 */
        
        .info-panel {
            color: white;
            text-align: center;
            margin-bottom: 20px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }
        
        .count-badge {
            display: inline-block;
            background: rgba(0, 0, 0, 0.5);
            padding: 5px 15px;
            border-radius: 20px;
            margin: 0 5px;
            font-size: 14px;
        }
        /* 扭蛋機本體 */
        
        .machine {
            position: relative;
            width: 320px;
            perspective: 1000px;
        }
        /* 上方玻璃球 */
        
        .dome {
            width: 260px;
            height: 260px;
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.5), rgba(255, 255, 255, 0.1) 50%, rgba(0, 0, 0, 0.2));
            border-radius: 50%;
            margin: 0 auto;
            border: 4px solid #333;
            position: relative;
            z-index: 2;
            overflow: hidden;
            backdrop-filter: blur(2px);
            box-shadow: inset -10px -10px 30px rgba(0, 0, 0, 0.3), 0 10px 20px rgba(0, 0, 0, 0.4);
        }
        /* 玻璃內的球 */
        
        .balls-container {
            position: absolute;
            bottom: 5px;
            left: 50%;
            transform: translateX(-50%);
            width: 220px;
            height: 150px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-content: flex-end;
        }
        
        .ball-in-dome {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            margin: -2px;
            box-shadow: inset -3px -3px 8px rgba(0, 0, 0, 0.3);
        }
        /* 機器下半部 */
        
        .body-bottom {
            width: 300px;
            height: 280px;
            background: linear-gradient(to right, var(--dark-red), var(--primary-red), var(--dark-red));
            margin: -40px auto 0;
            border-radius: 20px 20px 40px 40px;
            position: relative;
            z-index: 1;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5);
            border-bottom: 10px solid #550000;
        }
        /* 扭蛋轉盤（手把） */
        
        .crank-area {
            position: absolute;
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 120px;
            background: #eee;
            border-radius: 50%;
            border: 8px solid #333;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 5px 10px rgba(0, 0, 0, 0.5);
        }
        
        .handle {
            width: 90px;
            height: 25px;
            background: linear-gradient(to bottom, #bdc3c7, #2c3e50);
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.6s cubic-bezier(0.45, 0.05, 0.55, 0.95);
            position: relative;
        }
        
        .handle::after {
            content: '';
            position: absolute;
            width: 25px;
            height: 90px;
            background: inherit;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 10px;
        }
        /* 出蛋口 */
        
        .exit {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 90px;
            height: 70px;
            background: #1e1e1e;
            border-radius: 10px;
            box-shadow: inset 0 5px 15px rgba(0, 0, 0, 0.8);
            overflow: visible;
        }
        /* 掉出來的扭蛋 */
        
        .capsule {
            position: absolute;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            top: 10px;
            left: 20px;
            opacity: 0;
            z-index: 5;
        }
        /* 動畫類 */
        
        @keyframes shake {
            0% {
                transform: translate(0, 0) rotate(0);
            }
            25% {
                transform: translate(5px, 5px) rotate(2deg);
            }
            50% {
                transform: translate(-5px, -5px) rotate(-2deg);
            }
            75% {
                transform: translate(5px, -5px) rotate(1deg);
            }
            100% {
                transform: translate(0, 0) rotate(0);
            }
        }
        
        .shaking {
            animation: shake 0.2s infinite;
        }
        
        @keyframes drop-out {
            0% {
                transform: translateY(-50px) scale(0.5);
                opacity: 0;
            }
            50% {
                transform: translateY(20px) scale(1.2);
                opacity: 1;
            }
            100% {
                transform: translateY(80px) scale(2);
                opacity: 0;
            }
        }
        
        .dropping {
            animation: drop-out 1s forwards;
        }
        /* 結果彈窗 */
        
        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 100;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        
        .result-card {
            background: white;
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            transform: scale(0.8);
            animation: popIn 0.5s forwards cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        @keyframes popIn {
            to {
                transform: scale(1);
            }
        }
        /* 管理面板 */
        
        .admin-btn {
            margin-top: 50px;
            color: #555;
            cursor: pointer;
            font-size: 12px;
        }
        
        .admin-panel {
            display: none;
            position: fixed;
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            z-index: 200;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }
        
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            background: var(--primary-red);
            color: white;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="info-panel">
        <h2 onclick="toggleAdmin()" style="cursor:help">✨ 幸運扭蛋機 ✨</h2>
        <div class="count-badge">頭獎剩餘: <span id="count1">0</span></div>
        <div class="count-badge">二獎剩餘: <span id="count2">0</span></div>
        <div class="count-badge">三獎剩餘: <span id="count3">0</span></div>
    </div>

    <div class="machine" id="machine-node">
        <div class="dome" id="dome-node">
            <div class="balls-container" id="balls-bg">
                <!-- JS 會生成背景球 -->
            </div>
        </div>
        <div class="body-bottom">
            <div class="crank-area">
                <div class="handle" id="handle-btn"></div>
            </div>
            <div class="exit">
                <div class="capsule" id="capsule-node"></div>
            </div>
        </div>
    </div>

    <div class="admin-btn" onclick="toggleAdmin()">⚙️ 設定獎項數量</div>

    <div id="admin-panel" class="admin-panel">
        <h3>獎項庫存設定</h3>
        <label>頭獎數量：</label><input type="number" id="input-count1" value="1"><br><br>
        <label>二獎數量：</label><input type="number" id="input-count2" value="3"><br><br>
        <label>三獎數量：</label><input type="number" id="input-count3" value="5"><br><br>
        <button onclick="saveSettings()">儲存並重設</button>
        <button onclick="toggleAdmin()" style="background:#777">取消</button>
    </div>

    <div class="overlay" id="overlay">
        <div class="result-card">
            <h1 id="result-title" style="font-size: 48px; margin: 0;">恭喜！</h1>
            <p id="result-desc" style="font-size: 24px; color: #333;"></p>
            <button onclick="closeResult()">收下獎勵</button>
        </div>
    </div>

    <script>
        // 初始化資料
        let data = JSON.parse(localStorage.getItem('gashapon_data')) || {
            count1: 1,
            count2: 3,
            count3: 5,
        };

        const handleBtn = document.getElementById('handle-btn');
        const machineNode = document.getElementById('machine-node');
        const capsuleNode = document.getElementById('capsule-node');
        const overlay = document.getElementById('overlay');
        const resultDesc = document.getElementById('result-desc');
        const ballsBg = document.getElementById('balls-bg');

        let isDrawing = false;
        let rotation = 0;

        // 更新介面顯示
        function updateUI() {
            document.getElementById('count1').innerText = data.count1;
            document.getElementById('count2').innerText = data.count2;
            document.getElementById('count3').innerText = data.count3;
            localStorage.setItem('gashapon_data', JSON.stringify(data));
        }

        // 生成玻璃球內的小裝飾球
        function generateBalls() {
            ballsBg.innerHTML = '';
            const colors = ['#ff4757', '#2ed573', '#1e90ff', '#eccc68', '#ffa502', '#ffffff', '#3742fa'];
            for (let i = 0; i < 25; i++) {
                const ball = document.createElement('div');
                ball.className = 'ball-in-dome';
                ball.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                ball.style.transform = `rotate(${Math.random() * 360}deg)`;
                ballsBg.appendChild(ball);
            }
        }

        // 抽獎邏輯
        function draw() {
            if (isDrawing) return;
            isDrawing = true;

            // 1. 轉動把手動畫
            rotation += 360;
            handleBtn.style.transform = `rotate(${rotation}deg)`;

            // 2. 機器震動
            setTimeout(() => {
                machineNode.classList.add('shaking');
            }, 200);

            // 3. 計算結果
            setTimeout(() => {
                machineNode.classList.remove('shaking');

                // 隨機邏輯：先抽機率，再看庫存
                let rand = Math.random() * 100;
                let result = "";
                let color = "";

                if (rand <= 3 && data.count1 > 0) { // 5% 機率頭獎
                    result = "頭獎";
                    color = "gold";
                    data.count1--;
                } else if (rand <= 15 && data.count2 > 0) { // 12% 機率二獎
                    result = "二獎";
                    color = "silver";
                    data.count2--;
                } else if (rand <= 40 && data.count3 > 0) { // 25% 機率三獎
                    result = "三獎";
                    color = "#c0c0c0";
                    data.count3--;
                } else {
                    result = "銘謝惠顧";
                    color = "#ff4757";
                }

                // 4. 掉出扭蛋動畫
                capsuleNode.style.backgroundColor = color;
                capsuleNode.classList.add('dropping');

                setTimeout(() => {
                    showResult(result);
                    updateUI();
                }, 800);

            }, 1200);
        }

        function showResult(text) {
            resultDesc.innerText = text === "銘謝惠顧" ? "ㄚㄚ沒抽到，可惜" : `你抽中了 【${text}】！`;
            document.getElementById('result-title').innerText = text === "銘謝惠顧" ? "哎呀！" : "恭喜獲獎！";
            overlay.style.display = 'flex';
        }

        function closeResult() {
            overlay.style.display = 'none';
            capsuleNode.classList.remove('dropping');
            isDrawing = false;
        }

        // 管理員功能
        function toggleAdmin() {
            const panel = document.getElementById('admin-panel');
            panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
        }

        function saveSettings() {
            const c1 = parseInt(document.getElementById('input-count1').value);
            const c2 = parseInt(document.getElementById('input-count2').value);
            const c3 = parseInt(document.getElementById('input-count3').value);
            data.count1 = c1;
            data.count2 = c2;
            data.count3 = c3;

            updateUI();
            toggleAdmin();
            alert('設定已儲存並重置！');
        }

        handleBtn.addEventListener('click', draw);

        // 啟動
        generateBalls();
        updateUI();
    </script>

</body>

</html>
